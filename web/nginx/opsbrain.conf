# ============================================================================
# OpsBrain — Nginx 反向代理配置
#
# 监听 80 端口，将 /opsbrain 路径服务到前端和后端 API。
# ============================================================================

server {
    listen 80;
    server_name _;

    # ── Gzip ─────────────────────────────────────────────────────────
    gzip on;
    gzip_types text/plain text/css application/json application/javascript;
    gzip_min_length 1000;

    # ── 前端静态文件 ─────────────────────────────────────────────────
    location /opsbrain/ {
        alias /usr/share/nginx/html/opsbrain/;
        index index.html;

        # SPA: 所有非文件请求返回 index.html
        try_files $uri $uri/ /opsbrain/index.html;
    }

    # ── 前端根路径重定向（无尾部斜杠）──────────────────────────────
    location = /opsbrain {
        return 301 /opsbrain/;
    }

    # ── 根路径重定向到 /opsbrain/ ────────────────────────────────────
    location = / {
        return 301 /opsbrain/;
    }

    # ── API 反向代理 ────────────────────────────────────────────────
    # 去掉 /opsbrain 前缀，转发到后端
    location /opsbrain/api/ {
        rewrite ^/opsbrain(/api/.*)$ $1 break;
        resolver 127.0.0.11 valid=5s;
        proxy_pass http://web:8000;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }

    # ── 健康检查 ────────────────────────────────────────────────────
    location /opsbrain/healthz {
        access_log off;
        return 200 "OK\n";
    }

    # ── 安全头 ──────────────────────────────────────────────────────
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
}
